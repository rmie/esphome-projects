network:
    enable_ipv6: true
    min_ipv6_addr_count: 2
    enable_high_performance: true

web_server:
  port: 80

prometheus:

time:
  - platform: homeassistant
    id: ha_time
    
sensor:
  - platform: uptime
    name: "Uptime"

  - platform: internal_temperature
    name: "CPU Temperature"
    entity_category: diagnostic
    accuracy_decimals: 1  

button:
  - platform: restart
    name: "Restart"

binary_sensor:
  - platform: status
    name: "Status"

text_sensor:
  - platform: version
    name: "Version"